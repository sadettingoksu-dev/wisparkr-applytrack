name: CI

# master'a açılan her PR'da otomatik tip + lint kontrolü.
# Bu kontrol başarısızsa PR merge edilemez (branch protection ile zorunlu).
on:
  pull_request:
    branches: [master]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (next lint)
        run: npm run lint
